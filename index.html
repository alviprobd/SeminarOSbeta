<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDC OS - Powered by SeminarOS</title>
    <script>
      (function() {
        if (window.location.pathname && window.location.pathname.indexOf('//') !== -1) {
          var cleanPath = window.location.pathname.replace(/\/+/g, '/');
          if (cleanPath === '') cleanPath = '/';
          window.location.replace(window.location.origin + cleanPath + window.location.search + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
